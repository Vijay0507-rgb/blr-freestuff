<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLR FreeStuff — Give what you don't need. Get what you do.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080a;--s1:#0d0f11;--s2:#141618;--s3:#1c1f22;--s4:#242729;
  --b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.11);--b3:rgba(255,255,255,0.18);
  --t1:#f2efe9;--t2:#9a9690;--t3:#5a5752;
  --ac:#c8a96e;--ac2:rgba(200,169,110,0.15);--ac3:rgba(200,169,110,0.08);
  --gr:#4db87a;--gr2:rgba(77,184,122,0.12);
  --rd:#e05555;--rd2:rgba(224,85,85,0.12);
  --bl:#5b9cf6;--bl2:rgba(91,156,246,0.12);
  --am:#f0a040;--am2:rgba(240,160,64,0.12);
  --r:10px;--rl:16px;--rxl:22px;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);font-size:14px;line-height:1.6;overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--s4);border-radius:3px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--s3);border:1px solid var(--b2);border-radius:var(--r);padding:11px 20px;font-size:13px;font-weight:500;color:var(--t1);z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#toast.show{transform:translateX(-50%) translateY(0)}
#nav{position:sticky;top:0;z-index:300;background:rgba(7,8,10,.92);border-bottom:1px solid var(--b1);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.nav-inner{max-width:1240px;margin:0 auto;display:flex;align-items:center;gap:12px;padding:0 24px;height:58px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.logo-mark{width:32px;height:32px;background:var(--ac);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:11px;color:#1a1005;letter-spacing:-.3px}
.logo-text{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--t1);letter-spacing:-.3px}
.logo-text span{color:var(--ac)}
.ntab{padding:6px 14px;border-radius:8px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;transition:all .15s}
.ntab.active{color:var(--t1);background:var(--s2)}
.nav-tabs{display:flex;gap:2px;margin-left:8px}
.nav-spacer{flex:1}
.nav-search{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--b1);border-radius:9px;padding:0 14px;height:34px;width:200px;transition:all .25s}
.nav-search input{background:none;border:none;outline:none;color:var(--t1);width:100%}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid transparent}
.btn-accent{background:var(--ac);color:#1a1005;font-weight:600}
.hero{max-width:1240px;margin:0 auto;padding:60px 24px 52px;display:grid;grid-template-columns:1fr 360px;gap:56px;align-items:center}
.hero-h1{font-family:'Syne',sans-serif;font-size:52px;line-height:1.08;font-weight:800;margin-bottom:16px}
.hstats{display:flex;border:1px solid var(--b1);border-radius:var(--r);overflow:hidden}
.hstat{padding:14px 22px;flex:1;border-right:1px solid var(--b1)}
.main{max-width:1240px;margin:0 auto;padding:0 24px 80px}
.toolbar{display:flex;align-items:center;gap:10px;padding:18px 0 16px;border-bottom:1px solid var(--b1);margin-bottom:22px}
.cpill{padding:6px 14px;border-radius:20px;border:1px solid var(--b1);background:transparent;color:var(--t2);cursor:pointer}
.cpill.active{background:var(--ac);color:#1a1005}
#itemsGrid.gv{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}
.icard{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:14px;cursor:pointer}
.overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:var(--rxl);width:100%;max-width:500px;padding:26px}
.finp,.ftxa,.fsl{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:9px;padding:10px 13px;color:var(--t1);margin-bottom:14px;outline:none}
.fsbmt{width:100%;padding:13px;background:var(--ac);border:none;border-radius:11px;font-weight:800;cursor:pointer}
@media(max-width:960px){.hero{grid-template-columns:1fr;}.hero-vis{display:none}}
</style>
</head>
<body>
<div id="toast"><span id="tico"></span><span id="tmsg"></span></div>

<nav id="nav">
  <div class="nav-inner">
    <a class="logo" href="#"><div class="logo-mark">BLR</div><span class="logo-text">Free<span>Stuff</span></span></a>
    <div class="nav-tabs">
      <button class="ntab active" onclick="goTab('browse',this)">Browse</button>
      <button class="ntab" onclick="goTab('requests',this)">Requests</button>
      <button class="ntab" onclick="goTab('mine',this)">My Listings</button>
    </div>
    <div class="nav-spacer"></div>
    <div class="nav-search"><input type="text" placeholder="Search..." oninput="onSrch(this.value)"></div>
    <button class="btn btn-accent" onclick="openM('postModal')">Give Away</button>
  </div>
</nav>

<section class="hero">
  <div>
    <h1 class="hero-h1">Give what you don't need.<br><span style="color:var(--ac)">Get what you do.</span></h1>
    <div class="hstats">
      <div class="hstat"><div id="hs1">0</div><div style="font-size:10px">GIVEN</div></div>
      <div class="hstat"><div id="hs2">0</div><div style="font-size:10px">NEIGHBOURS</div></div>
      <div class="hstat"><div id="hs3">0</div><div style="font-size:10px">AREAS</div></div>
    </div>
  </div>
</section>

<div class="main">
  <div id="tab-browse">
    <div class="toolbar">
      <button class="cpill active" onclick="setCat('All',this)">✨ All</button>
      <button class="cpill" onclick="setCat('Furniture',this)">🪑 Furniture</button>
      <button class="cpill" onclick="setCat('Electronics',this)">📱 Electronics</button>
    </div>
    <div id="itemsGrid" class="gv"></div>
  </div>

  <div id="tab-requests" style="display:none">
    <div id="rqgrid"></div>
  </div>

  <div id="tab-mine" style="display:none">
    <div id="mngrid"></div>
  </div>
</div>

<div class="overlay" id="postModal" onclick="outerClick(event,'postModal')">
  <div class="modal">
    <h3>Give Away 📦</h3>
    <input class="finp" id="pt" placeholder="What is it?">
    <textarea class="ftxa" id="pd" placeholder="Details..."></textarea>
    <select class="fsl" id="pc"><option value="Furniture">Furniture</option><option value="Electronics">Electronics</option></select>
    <input class="finp" id="pa" placeholder="Area (e.g. HSR)">
    <input class="finp" id="pp" placeholder="WhatsApp Number">
    <button class="fsbmt" onclick="submitPost()">Post Now</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
